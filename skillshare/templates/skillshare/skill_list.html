{% extends "skillshare/base.html" %}

{% block content %}
    {% for object in object_list %}
    <ul>
        <li>{{ object.name }} -- {{ object.category }} by @{{ object.giver.username }}</li>
    </ul>
    {% empty %}
        <li>Pas encore de compétences enregistrées..</li>
    {% endfor %}
{% endblock %}
